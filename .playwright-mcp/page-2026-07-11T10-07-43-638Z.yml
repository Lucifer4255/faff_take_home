          - generic [ref=f13e850]:
            - generic [ref=f13e853]:
              - paragraph [ref=f13e857] [cursor=pointer]: How does the pricing of AC services work?
              - paragraph [ref=f13e862]: The pricing of our AC services depends solely on the type of service you require. We offer transparent pricing, ensuring you know exactly what to expect without any hidden costs.
            - generic [ref=f13e866]:
              - paragraph [ref=f13e870] [cursor=pointer]: What types of AC services does Urban Company offer?
              - paragraph [ref=f13e875]: Urban Company offers a comprehensive range of AC services(window ac service & split ac service) including foam & power jet cleaning, power jet servicing(jet pump ac service), anti-rust deep clean, AC repair for both split and window units, gas leak fixing & ac gas refill, split AC installation / uninstallation, window AC installation / uninstallation, ac pcb repair, ac filter cleaning, ac vent cleaning etc.
            - generic [ref=f13e879]:
              - paragraph [ref=f13e883] [cursor=pointer]: What safety measures does Urban Company follow, especially during the COVID-19 pandemic?
              - paragraph [ref=f13e888]: Urban Company prioritizes the safety of both our customers and professionals. We follow strict COVID-19 guidelines, including mandatory mask-wearing, sanitisation, and social distancing. Our professionals are equipped with necessary protective gear to ensure a safe service experience.
            - generic [ref=f13e892]:
              - paragraph [ref=f13e896] [cursor=pointer]: Can I trust the professionals sent by Urban Company?
              - paragraph [ref=f13e901]: Absolutely! We understand the importance of safety and trust. All our professionals are background verified, and our platform provides full insurance coverage. Additionally, you can communicate directly with the assigned professional through our app for added peace of mind.
            - generic [ref=f13e905]:
              - paragraph [ref=f13e909] [cursor=pointer]: How can I reach Urban Company's support team if I have any questions or concerns?
              - paragraph [ref=f13e914]: If you have any questions or concerns, you can easily reach out to our support team through our app or website. Our dedicated support agents are available to assist you from 8 a.m. to 10 p.m. daily, ensuring prompt resolution of any issues you may encounter.
            - generic [ref=f13e918]:
              - paragraph [ref=f13e922] [cursor=pointer]: Are there any warranties provided for the services?
              - paragraph [ref=f13e927]: Yes, Urban Company provides a 30-day warranty on all our AC services. This ensures that you have peace of mind and can rely on the quality of our workmanship.
            - generic [ref=f13e931]:
              - paragraph [ref=f13e935] [cursor=pointer]: Can I request the same professional for future services?
              - paragraph [ref=f13e940]: Yes, Urban Company allows you to request the same professional for future services if you're satisfied with their work. We understand the importance of building trust and rapport with our customers.
            - generic [ref=f13e944]:
              - paragraph [ref=f13e948] [cursor=pointer]: How can I book AC Service and AC Repair near me with Urban Company?
              - paragraph [ref=f13e953]: Booking your AC Service and Repair with Urban Company is simple and hassle-free. You can do it through our app or website. Just select the service you need, choose a convenient time slot, and we'll assign a skilled professional to take care of your AC needs.
            - generic [ref=f13e957]:
              - paragraph [ref=f13e961] [cursor=pointer]: What if I need to reschedule or cancel my booking?
              - paragraph [ref=f13e966]: Urban Company understands that plans can change. You can easily reschedule or cancel your booking through our app or website. We provide flexibility to adjust your service as needed without any hassle.
        - generic [ref=f13e978]:
          - generic [ref=f13e983]:
            - heading "Ac in Bangalore, India" [level=2] [ref=f13e988]
            - paragraph [ref=f13e993]: Get your window or split AC service in Bangalore, India done by Urban Company's Power Jet AC Service technicians. We offer you a 90 Day service guarantee with INR 10k insurance against damage for every AC serviced. Also get a no questions asked 90 day revisit policy. Only genuine spare parts are supplied with fixed pricing. Urban Company will help you connect with the best AC services to cater your needs, right at your doorstep.
