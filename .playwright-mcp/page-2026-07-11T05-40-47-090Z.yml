            - paragraph [ref=e1941]: Your comfort and well-being is of chief importance to us. We only send female massage therapists for women.
            - heading "High Quality Products and Portable Spa Bed:" [level=2] [ref=e1943]
            - paragraph [ref=e1946]: We bring the complete spa experience at home. Our therapists carry a full-size spa bed bring candles, aromatherapy oils and play soothing music to create a spa-like ambience.
