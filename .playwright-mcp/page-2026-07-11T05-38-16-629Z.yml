          - generic [ref=e809]:
            - generic [ref=e812]:
              - paragraph [ref=e816] [cursor=pointer]: What safety measures does Urban Company follow, especially during the COVID-19 pandemic?
              - paragraph [ref=e821]: Urban Company prioritizes the safety of both our customers and professionals. We follow strict COVID-19 guidelines, including mandatory mask-wearing, sanitisation, and social distancing. Our professionals are equipped with necessary protective gear to ensure a safe service experience.
            - generic [ref=e825]:
              - paragraph [ref=e829] [cursor=pointer]: Are there any warranties provided for the services?
              - paragraph [ref=e834]: Yes, Urban Company provides a 30-day warranty on all our AC services. This ensures that you have peace of mind and can rely on the quality of our workmanship.
            - generic [ref=e838]:
              - paragraph [ref=e842] [cursor=pointer]: Can I request the same professional for future services?
              - paragraph [ref=e847]: Yes, Urban Company allows you to request the same professional for future services if you're satisfied with their work. We understand the importance of building trust and rapport with our customers.
            - generic [ref=e851]:
              - paragraph [ref=e855] [cursor=pointer]: How does the pricing of AC services work?
              - paragraph [ref=e860]: The pricing of our AC services depends solely on the type of service you require. We offer transparent pricing, ensuring you know exactly what to expect without any hidden costs.
            - generic [ref=e864]:
              - paragraph [ref=e868] [cursor=pointer]: What types of AC services does Urban Company offer?
              - paragraph [ref=e873]: Urban Company offers a comprehensive range of AC services(window ac service & split ac service) including foam & power jet cleaning, power jet servicing(jet pump ac service), anti-rust deep clean, AC repair for both split and window units, gas leak fixing & ac gas refill, split AC installation / uninstallation, window AC installation / uninstallation, ac pcb repair, ac filter cleaning, ac vent cleaning etc.
            - generic [ref=e877]:
              - paragraph [ref=e881] [cursor=pointer]: How can I book AC Service and AC Repair near me with Urban Company?
              - paragraph [ref=e886]: Booking your AC Service and Repair with Urban Company is simple and hassle-free. You can do it through our app or website. Just select the service you need, choose a convenient time slot, and we'll assign a skilled professional to take care of your AC needs.
            - generic [ref=e890]:
              - paragraph [ref=e894] [cursor=pointer]: Can I trust the professionals sent by Urban Company?
              - paragraph [ref=e899]: Absolutely! We understand the importance of safety and trust. All our professionals are background verified, and our platform provides full insurance coverage. Additionally, you can communicate directly with the assigned professional through our app for added peace of mind.
            - generic [ref=e903]:
              - paragraph [ref=e907] [cursor=pointer]: How can I reach Urban Company's support team if I have any questions or concerns?
              - paragraph [ref=e912]: If you have any questions or concerns, you can easily reach out to our support team through our app or website. Our dedicated support agents are available to assist you from 8 a.m. to 10 p.m. daily, ensuring prompt resolution of any issues you may encounter.
            - generic [ref=e916]:
              - paragraph [ref=e920] [cursor=pointer]: What if I need to reschedule or cancel my booking?
              - paragraph [ref=e925]: Urban Company understands that plans can change. You can easily reschedule or cancel your booking through our app or website. We provide flexibility to adjust your service as needed without any hassle.
