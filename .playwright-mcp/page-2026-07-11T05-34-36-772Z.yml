        - generic [ref=f6e826]:
          - heading "Frequently asked questions" [level=2] [ref=f6e831]
          - generic [ref=f6e832]:
            - generic [ref=f6e835]:
              - paragraph [ref=f6e839] [cursor=pointer]: How can I reach Urban Company's support team if I have any questions or concerns?
              - paragraph [ref=f6e844]: If you have any questions or concerns, you can easily reach out to our support team through our app or website. Our dedicated support agents are available to assist you from 8 a.m. to 10 p.m. daily, ensuring prompt resolution of any issues you may encounter.
            - generic [ref=f6e848]:
              - paragraph [ref=f6e852] [cursor=pointer]: What if I need to reschedule or cancel my booking?
              - paragraph [ref=f6e857]: Urban Company understands that plans can change. You can easily reschedule or cancel your booking through our app or website. We provide flexibility to adjust your service as needed without any hassle.
            - generic [ref=f6e861]:
              - paragraph [ref=f6e865] [cursor=pointer]: Are there any warranties provided for the services?
              - paragraph [ref=f6e870]: Yes, Urban Company provides a 30-day warranty on all our AC services. This ensures that you have peace of mind and can rely on the quality of our workmanship.
            - generic [ref=f6e874]:
              - paragraph [ref=f6e878] [cursor=pointer]: Can I request the same professional for future services?
              - paragraph [ref=f6e883]: Yes, Urban Company allows you to request the same professional for future services if you're satisfied with their work. We understand the importance of building trust and rapport with our customers.
            - generic [ref=f6e887]:
              - paragraph [ref=f6e891] [cursor=pointer]: What types of AC services does Urban Company offer?
              - paragraph [ref=f6e896]: Urban Company offers a comprehensive range of AC services(window ac service & split ac service) including foam & power jet cleaning, power jet servicing(jet pump ac service), anti-rust deep clean, AC repair for both split and window units, gas leak fixing & ac gas refill, split AC installation / uninstallation, window AC installation / uninstallation, ac pcb repair, ac filter cleaning, ac vent cleaning etc.
            - generic [ref=f6e900]:
              - paragraph [ref=f6e904] [cursor=pointer]: How can I book AC Service and AC Repair near me with Urban Company?
              - paragraph [ref=f6e909]: Booking your AC Service and Repair with Urban Company is simple and hassle-free. You can do it through our app or website. Just select the service you need, choose a convenient time slot, and we'll assign a skilled professional to take care of your AC needs.
            - generic [ref=f6e913]:
              - paragraph [ref=f6e917] [cursor=pointer]: What safety measures does Urban Company follow, especially during the COVID-19 pandemic?
              - paragraph [ref=f6e922]: Urban Company prioritizes the safety of both our customers and professionals. We follow strict COVID-19 guidelines, including mandatory mask-wearing, sanitisation, and social distancing. Our professionals are equipped with necessary protective gear to ensure a safe service experience.
            - generic [ref=f6e926]:
              - paragraph [ref=f6e930] [cursor=pointer]: Can I trust the professionals sent by Urban Company?
              - paragraph [ref=f6e935]: Absolutely! We understand the importance of safety and trust. All our professionals are background verified, and our platform provides full insurance coverage. Additionally, you can communicate directly with the assigned professional through our app for added peace of mind.
            - generic [ref=f6e939]:
              - paragraph [ref=f6e943] [cursor=pointer]: How does the pricing of AC services work?
              - paragraph [ref=f6e948]: The pricing of our AC services depends solely on the type of service you require. We offer transparent pricing, ensuring you know exactly what to expect without any hidden costs.
        - generic [ref=f6e960]:
          - generic [ref=f6e965]:
            - heading "Ac Service & Repair in Delhi NCR, India" [level=2] [ref=f6e970]
            - paragraph [ref=f6e975]: Get your window or split AC service in Delhi NCR, India done by Urban Company's Power Jet AC Service technicians. We offer you a 90 Day service guarantee with INR 10k insurance against damage for every AC serviced. Also get a no questions asked 90 day revisit policy. Only genuine spare parts are supplied with fixed pricing. Urban Company will help you connect with the best AC services to cater your needs, right at your doorstep.
