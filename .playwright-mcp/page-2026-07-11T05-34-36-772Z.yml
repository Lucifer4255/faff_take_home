            - paragraph [ref=f6e3111]: "Installing an AC: Choose this service for AC installation at your place. The professional will ensure that the AC is running properly as gas pressure and performance of the appliance will be checked post AC installation."
          - generic [ref=f6e3112]:
            - paragraph [ref=f6e3114]: "3."
            - paragraph [ref=f6e3116]: "Wet services: This service includes an end to end cleaning of your AC. Cooling coils, condenser coils, outer panel, drain and filet pipes will be extensively cleaned and washed. Choose this service when you want your AC to be properly cleaned."
          - generic [ref=f6e3117]:
            - paragraph [ref=f6e3119]: "4."
            - paragraph [ref=f6e3121]: "Repairs: Choose this option for diagnosis and repair of your AC. The professional will check the AC upon visitation and provide with quotation depending on the condition of the appliance."
          - paragraph [ref=f6e3124]: Like any other machinery, an appliance such as AC needs to be maintained and looked after for its healthy functioning. Hence, the appliance should receive a proper service before the start of summer season. After all, nothing can be worse than a broken or faulty AC. Hunting a service personnel for AC repair in the sultry weather can be a hassle. You can now book a professional either for service and repair within minutes from your home. You don’t even need to clear your schedule as you can choose your desirable time slot. Urban Company’s AC repair service has proven to be a blessing for our customers as we continue to receive happy testimonials and ratings from our customers.
