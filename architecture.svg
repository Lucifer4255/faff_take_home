<svg width="100%" viewBox="0 0 680 632" role="img" xmlns="http://www.w3.org/2000/svg">
<title>faff agent harness architecture</title>
<desc>Free text flows from a user through a chat UI and streaming API into an agentic controller, which drives a shared four-stage harness (interpret, resolve, drive, observe) guarded by an EXECUTE money gate, with three pluggable adapters reaching external targets.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.ts{font-size:12px;font-weight:400;fill:#5F5E5A}
.arr{stroke:#888780;stroke-width:1.5;fill:none;marker-end:url(#arrow)}
.gray{fill:#F1EFE8;stroke:#B4B2A9;stroke-width:1}
.purple{fill:#EEEDFE;stroke:#7F77DD;stroke-width:1}
.teal{fill:#E1F5EE;stroke:#5DCAA5;stroke-width:1}
.coral{fill:#FAECE7;stroke:#F0997B;stroke-width:1}
.amber{fill:#FAEEDA;stroke:#EF9F27;stroke-width:1}
</style>
</defs>

<rect class="gray" x="265" y="30" width="150" height="40" rx="6"/><text class="th" x="340" y="47" text-anchor="middle">User</text><text class="ts" x="340" y="61" text-anchor="middle">free text + address</text>

<line class="arr" x1="340" y1="70" x2="340" y2="90"/>

<rect class="gray" x="160" y="92" width="360" height="46" rx="6"/><text class="th" x="340" y="112" text-anchor="middle">Chat UI / CLI client</text><text class="ts" x="340" y="128" text-anchor="middle">renders typed SSE events</text>

<line x1="340" y1="138" x2="340" y2="160" stroke="#5F5E5A" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<rect class="gray" x="120" y="160" width="440" height="52" rx="6"/><text class="th" x="340" y="182" text-anchor="middle">Streaming API — Fastify</text><text class="ts" x="340" y="199" text-anchor="middle">POST /sessions · SSE /stream · POST /message</text>

<line class="arr" x1="340" y1="212" x2="340" y2="232"/>

<rect class="purple" x="120" y="232" width="440" height="60" rx="6"/><text class="th" x="340" y="256" text-anchor="middle">Agentic controller — Mastra</text><text class="ts" x="340" y="273" text-anchor="middle">bounded loop · constrained tools · trace</text>

<line class="arr" x1="340" y1="292" x2="340" y2="312"/>

<rect class="purple" x="40" y="312" width="135" height="56" rx="6"/><text class="th" x="107" y="336" text-anchor="middle">Interpret</text><text class="ts" x="107" y="352" text-anchor="middle">text → intent</text>
<rect class="teal" x="195" y="312" width="135" height="56" rx="6"/><text class="th" x="262" y="336" text-anchor="middle">Resolve</text><text class="ts" x="262" y="352" text-anchor="middle">→ target IDs</text>
<rect class="teal" x="350" y="312" width="135" height="56" rx="6"/><text class="th" x="417" y="336" text-anchor="middle">Drive</text><text class="ts" x="417" y="352" text-anchor="middle">execute action</text>
<rect class="teal" x="505" y="312" width="135" height="56" rx="6"/><text class="th" x="572" y="336" text-anchor="middle">Observe</text><text class="ts" x="572" y="352" text-anchor="middle">poll state</text>

<line class="arr" x1="175" y1="340" x2="193" y2="340"/>
<line class="arr" x1="330" y1="340" x2="348" y2="340"/>
<line class="arr" x1="485" y1="340" x2="503" y2="340"/>

<line class="arr" x1="417" y1="368" x2="352" y2="390"/>

<rect class="amber" x="190" y="392" width="300" height="46" rx="6"/><text class="th" x="340" y="412" text-anchor="middle">EXECUTE gate</text><text class="ts" x="340" y="428" text-anchor="middle">confirm before any charge</text>

<line class="arr" x1="340" y1="438" x2="340" y2="460"/>

<rect class="coral" x="40" y="460" width="186" height="56" rx="6"/><text class="th" x="133" y="484" text-anchor="middle">Blinkit adapter</text><text class="ts" x="133" y="500" text-anchor="middle">reverse-eng API</text>
<rect class="coral" x="247" y="460" width="186" height="56" rx="6"/><text class="th" x="340" y="484" text-anchor="middle">Home services adapter</text><text class="ts" x="340" y="500" text-anchor="middle">browser hybrid</text>
<rect class="coral" x="454" y="460" width="186" height="56" rx="6"/><text class="th" x="547" y="484" text-anchor="middle">Delivery adapter</text><text class="ts" x="547" y="500" text-anchor="middle">auth capture + API</text>

<line class="arr" x1="133" y1="516" x2="133" y2="538"/>
<line class="arr" x1="340" y1="516" x2="340" y2="538"/>
<line class="arr" x1="547" y1="516" x2="547" y2="538"/>

<rect class="gray" x="40" y="538" width="186" height="50" rx="6"/><text class="th" x="133" y="558" text-anchor="middle">Blinkit</text><text class="ts" x="133" y="574" text-anchor="middle">checkout-ready cart</text>
<rect class="gray" x="247" y="538" width="186" height="50" rx="6"/><text class="th" x="340" y="558" text-anchor="middle">Urban Co / Snabbit</text><text class="ts" x="340" y="574" text-anchor="middle">booking-ready slot</text>
<rect class="gray" x="454" y="538" width="186" height="50" rx="6"/><text class="th" x="547" y="558" text-anchor="middle">Rapido / Porter</text><text class="ts" x="547" y="574" text-anchor="middle">quote → ride updates</text>

<rect x="40" y="602" width="12" height="12" rx="3" fill="#EF9F27"/>
<text class="ts" x="58" y="612" text-anchor="start">amber = EXECUTE / money boundary — nothing is charged until the user confirms</text>
</svg>
